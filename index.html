<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster | Test Your Knowledge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <section id="home-screen" class="screen active">
            <h1 class="logo">Quiz<span>Master</span></h1>
            <p class="subtitle">Select a topic to challenge yourself</p>
            
            <div class="topic-grid">
                <div class="topic-card" data-topic="programming">
                    <i class="fas fa-code"></i>
                    <h3>Programming</h3>
                    <p>JS, HTML, CSS & Logic</p>
                </div>
                <div class="topic-card" data-topic="gk">
                    <i class="fas fa-globe-americas"></i>
                    <h3>General Knowledge</h3>
                    <p>History, Science & World</p>
                </div>
                <div class="topic-card" data-topic="aptitude">
                    <i class="fas fa-brain"></i>
                    <h3>Aptitude</h3>
                    <p>Math, Logic & Reasoning</p>
                </div>
            </div>

            <div id="settings-area" class="hidden">
                <h3>Select Number of Questions</h3>
                <div class="count-options">
                    <button class="count-btn" data-count="5">5</button>
                    <button class="count-btn" data-count="10">10</button>
                    <button class="count-btn" data-count="20">20</button>
                </div>
                <button id="start-btn" class="primary-btn">Start Quiz</button>
            </div>
        </section>

        <section id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="timer">
                    <i class="far fa-clock"></i> <span id="time-left">00:00</span>
                </div>
                <div class="progress-text">Question <span id="current-q">1</span> of <span id="total-q">10</span></div>
            </div>
            
            <div class="progress-bar-container">
                <div id="progress-fill"></div>
            </div>

            <div class="question-container">
                <h2 id="question-text">Question text goes here?</h2>
                <div id="options-container" class="options-grid">
                    </div>
            </div>

            <div class="quiz-footer">
                <button id="prev-btn" class="secondary-btn" disabled>Previous</button>
                <button id="next-btn" class="primary-btn">Next</button>
            </div>
        </section>

        <section id="result-screen" class="screen">
            <div class="result-card">
                <div id="result-icon"></div>
                <h2 id="result-message">Congratulations!</h2>
                
                <div class="score-display">
                    <div class="score-circle">
                        <span id="score-percent">0%</span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="label">Total</span>
                        <span id="stat-total" class="val">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Correct</span>
                        <span id="stat-correct" class="val">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Wrong</span>
                        <span id="stat-wrong" class="val">0</span>
                    </div>
                </div>

                <button id="restart-btn" class="primary-btn">Try Another Quiz</button>
            </div>
        </section>
    </div>

    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/600/600-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/601/601-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
